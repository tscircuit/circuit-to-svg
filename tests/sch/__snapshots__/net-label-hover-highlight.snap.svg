              /* Source trace hover: fallback highlighting by source_trace_id */
              svg:has(:is(g.trace[data-source-trace-id="source_trace_1"], g.trace-overlays[data-source-trace-id="source_trace_1"]):hover) :is(g.trace[data-source-trace-id="source_trace_1"], g.trace-overlays[data-source-trace-id="source_trace_1"]) { filter: invert(1); }
svg:has(:is(g.trace[data-source-trace-id="source_trace_1"], g.trace-overlays[data-source-trace-id="source_trace_1"]):hover) g.trace-overlays[data-source-trace-id="source_trace_1"] .trace-crossing-outline { opacity: 0; }
              /* Source net hover: highlight all traces and net labels sharing the same source_net_id */
              svg:has(:is(g.trace[data-source-net-id="net_1"], g.trace-overlays[data-source-net-id="net_1"]):hover) g.trace[data-source-net-id="net_1"], svg:has(:is(g.trace[data-source-net-id="net_1"], g.trace-overlays[data-source-net-id="net_1"]):hover) g.trace-overlays[data-source-net-id="net_1"], svg:has(:is(g.trace[data-source-net-id="net_1"], g.trace-overlays[data-source-net-id="net_1"]):hover) .net-label[data-source-net-id="net_1"] { filter: invert(1); }
svg:has(:is(g.trace[data-source-net-id="net_1"], g.trace-overlays[data-source-net-id="net_1"]):hover) g.trace-overlays[data-source-net-id="net_1"] .trace-crossing-outline { opacity: 0; }

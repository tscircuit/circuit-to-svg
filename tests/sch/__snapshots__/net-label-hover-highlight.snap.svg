<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" style="background-color: rgb(245, 241, 237)" data-real-to-screen-transform="matrix(493.4210526316,0,0,-493.4210526316,353.2894736842,300)"><style>
              .boundary { fill: rgb(245, 241, 237); }
